version: '3.8'
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: softlinkia-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
    networks:
      - softlinkia-network

  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-softlinkia_db}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
      MYSQL_PASSWORD: ${DB_PASSWORD:-root}
      MYSQL_USER: ${DB_USERNAME:-root}
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - softlinkia-network

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/conf.d:/etc/nginx/conf.d
    networks:
      - softlinkia-network

networks:
  softlinkia-network:
    driver: bridge

volumes:
  dbdata:
    driver: local
